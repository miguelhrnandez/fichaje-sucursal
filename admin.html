<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>Panel de Jefa - Fichaje</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {

/* ====== LOGIN ====== */

.logo-admin {

}

.login-title {

  font-weight: 700;
  margin-bottom: 4px;

}

.login-subtitle {
  text-align: center;
  font-size: 13px;
  color: rgba(167, 139, 250, 0.8);
  margin-bottom: 28px;
  letter-spacing: 0.05em;
}

.field-group { margin-bottom: 14px; }

.field-label {
  display: block;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;

  margin-bottom: 8px;

}

input, select {

  padding: 13px 16px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 12px;
  color: #fff;
  font-family: inherit;
  font-size: 15px;
  outline: none;
}

input:focus, select:focus { border-color: #a78bfa; }
select option { background: #1a1a2e; }

.btn-admin {

  padding: 14px;

  color: #fff;
  border: none;
  border-radius: 12px;
  font-family: inherit;
  font-size: 15px;

  margin-top: 14px;

.btn-admin:hover { transform: translateY(-1px); }
.btn-admin:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-ghost {

  padding: 12px;

  border: 1px solid rgba(255, 255, 255, 0.15);
  color: rgba(255, 255, 255, 0.7);
  border-radius: 12px;
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  margin-top: 8px;
}

.error-box {

  border-radius: 10px;
  font-size: 13px;
  margin-top: 12px;

.error-box.show { display: block; }

/* ====== ADMIN LAYOUT ====== */
.admin-wrap {

}

.admin-header {

.back-btn {

.tab.active {

.tab-content { display: none; }

/* ====== FILTERS ====== */
.filters-bar {

.filter-group {

}

.filter-label {

.filter-select {

  border-radius: 8px;
  color: #fff;

.month-nav {

  border-radius: 8px;

.month-btn {

.summary-table {

.summary-table th {

.summary-table td {

.summary-table tr:last-child td { border-bottom: none; }

/* ====== DETAIL MODAL ====== */
.detail-overlay {

<script>
const SUPABASE_URL = 'https://raykzuncciaaouleezmx.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJheWt6dW5jY2lhYW91bGVlem14Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NjQ2MzIsImV4cCI6MjA5NDI0MDYzMn0.w50r_YXzMPZjM8BqJYkP1yA5i_sl4yz3i7io_Fx6dX8';

const ROLES = {

  reponedora: 'Reponedoras',

  atencion: 'Atención al cliente',

const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let employees = [];
let allPunches = [];
let viewMonth = new Date();
viewMonth.setDate(1);

// ============ LOGIN ============
async function doLogin() {
  const username = document.getElementById('usernameInput').value.trim().toLowerCase();
  const password = document.getElementById('passwordInput').value;
  const errBox = document.getElementById('loginError');
  errBox.classList.remove('show');

  if (!username || !password) {
    errBox.textContent = 'Completá usuario y contraseña';
    errBox.classList.add('show');
    return;
  }

  try {
    const { data } = await db
      .from('employees')
      .select('*')
      .eq('username', username)
      .eq('active', true)
      .single();

    if (!data || data.password !== password) {
      errBox.textContent = 'Usuario o contraseña incorrectos';
      errBox.classList.add('show');
      return;
    }

    if (!data.is_manager && !data.is_admin) {
      errBox.textContent = 'No tenés permisos para acceder a este panel';
      errBox.classList.add('show');
      return;
    }

    currentUser = data;
    document.getElementById('loginScreen').classList.remove('show');
    document.getElementById('adminScreen').classList.add('show');
    document.getElementById('adminUserName').textContent = 
      currentUser.full_name + (currentUser.is_admin ? ' · Admin' : ' · Jefa');

    await loadAllData();
    renderSummary();
  } catch (err) {
    console.error('Error en login:', err);
    errBox.textContent = 'Error de conexión';
    errBox.classList.add('show');
  }
}

function logout() {
  currentUser = null;
  document.getElementById('adminScreen').classList.remove('show');
  document.getElementById('loginScreen').classList.add('show');
  document.getElementById('usernameInput').value = '';
  document.getElementById('passwordInput').value = '';
}

// ============ TABS ============
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

// ============ DATA LOAD ============
async function loadAllData() {
  try {
    const { data: emps } = await db
      .from('employees')
      .select('*')
      .eq('active', true)
      .order('full_name');

    employees = emps || [];

    // Cargar fichajes del mes en vista
    const start = new Date(viewMonth);
    const end = new Date(viewMonth);
    end.setMonth(end.getMonth() + 1);

    const { data: punches } = await db
      .from('punches')
      .select('*')
      .gte('timestamp', start.toISOString())
      .lt('timestamp', end.toISOString())
      .order('timestamp', { ascending: true });

    allPunches = punches || [];
  } catch (err) {
    console.error('Error cargando datos:', err);
  }
}

// ============ MONTH NAV ============
async function changeMonth(delta) {
  viewMonth.setMonth(viewMonth.getMonth() + delta);
  
  // No permitir ir al futuro más allá del mes actual
  const now = new Date();
  now.setDate(1);
  if (viewMonth > now) {
    viewMonth = now;
  }
  
  updateMonthDisplay();
  await loadAllData();
  renderSummary();
}

function updateMonthDisplay() {
  const display = document.getElementById('monthDisplay');
  display.textContent = viewMonth.toLocaleDateString('es-AR', { 
    month: 'long', 
    year: 'numeric' 
  });

  // Deshabilitar "siguiente" si es mes actual
  const now = new Date();
  now.setDate(1);
  document.getElementById('nextMonthBtn').disabled = 
    viewMonth.getFullYear() === now.getFullYear() && 
    viewMonth.getMonth() === now.getMonth();
}

// ============ CÁLCULOS ============
function getEmployeeStats(empId) {
  const empPunches = allPunches.filter(p => p.employee_id === empId);
  
  let totalMin = 0;
  let breakMin = 0;
  let breakCount = 0;
  const daysWorked = new Set();

  // Procesar por día
  const byDay = {};
  empPunches.forEach(p => {
    const day = new Date(p.timestamp).toDateString();
    if (!byDay[day]) byDay[day] = [];
    byDay[day].push(p);
  });

  for (const day in byDay) {
    const dayPunches = byDay[day].sort((a, b) => 
      new Date(a.timestamp) - new Date(b.timestamp)
    );
    
    let dayWork = 0;
    let dayBreak = 0;
    let currentIn = null;
    let currentBreakStart = null;
    let hasIn = false;

    for (const p of dayPunches) {
      const t = new Date(p.timestamp).getTime();
      
      if (p.punch_type === 'in') {
        currentIn = t;
        hasIn = true;
      } else if (p.punch_type === 'out' && currentIn) {
        dayWork += (t - currentIn) / 60000;
        currentIn = null;
      } else if (p.punch_type === 'break_start') {
        currentBreakStart = t;
        breakCount++;
      } else if (p.punch_type === 'break_end' && currentBreakStart) {
        dayBreak += (t - currentBreakStart) / 60000;
        currentBreakStart = null;
      }
    }

    if (hasIn) daysWorked.add(day);
    totalMin += dayWork;
    breakMin += dayBreak;
  }

  return {
    totalHours: totalMin / 60,
    productiveHours: (totalMin - breakMin) / 60,
    daysWorked: daysWorked.size,
    breakCount: breakCount,
    breakHours: breakMin / 60
  };
}

  empPunches.forEach(p => {
    const day = new Date(p.timestamp).toDateString();
    if (!byDay[day]) byDay[day] = [];
    byDay[day].push(p);
  });

  const result = [];
  for (const day in byDay) {
    const dayPunches = byDay[day].sort((a, b) => 
      new Date(a.timestamp) - new Date(b.timestamp)
    );
    
    let dayWork = 0;
    let dayBreak = 0;
    let entrada = null;
    let salida = null;
    const breaks = [];
    let currentIn = null;
    let currentBreakStart = null;

    for (const p of dayPunches) {
      const t = new Date(p.timestamp).getTime();
      
      if (p.punch_type === 'in') {
        currentIn = t;
        if (!entrada) entrada = p.timestamp;
      } else if (p.punch_type === 'out' && currentIn) {
        dayWork += (t - currentIn) / 60000;
        salida = p.timestamp;
        currentIn = null;
      } else if (p.punch_type === 'break_start') {
        currentBreakStart = { time: t, ts: p.timestamp };
      } else if (p.punch_type === 'break_end' && currentBreakStart) {
        const dur = (t - currentBreakStart.time) / 60000;
        dayBreak += dur;
        breaks.push({
          start: currentBreakStart.ts,
          end: p.timestamp,
          duration: dur
        });
        currentBreakStart = null;
      }
    }

    result.push({
      date: new Date(day),
      entrada: entrada,
      salida: salida,
      totalMin: dayWork,
      breakMin: dayBreak,
      productiveMin: dayWork - dayBreak,
      breaks: breaks,
      role: dayPunches[0]?.role
    });
  }

  return result.sort((a, b) => b.date - a.date);
}

// ============ RENDER ============
function renderSummary() {
  const filter = document.getElementById('filterRole').value;
  const container = document.getElementById('summaryContent');

  // Filtrar empleadas
  let filtered = employees;
  if (filter !== 'all') {
    filtered = employees.filter(e => e.default_role === filter);
  }

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state">No hay empleadas con este filtro</div>';
    return;
  }

  // Agrupar por puesto
  const groups = {};
  filtered.forEach(e => {
    if (!groups[e.default_role]) groups[e.default_role] = [];
    groups[e.default_role].push(e);
  });

  let html = '';
  const orderedRoles = ['cajera', 'encargada', 'reponedora', 'limpieza', 'atencion', 'promotor'];
  
  for (const role of orderedRoles) {
    if (!groups[role]) continue;
    const emps = groups[role];
    
    html += `
      <div class="group-section">
        <div class="group-header">
          <div class="group-title">${ROLES[role] || role}</div>
          <div class="group-count">${emps.length} ${emps.length === 1 ? 'empleada' : 'empleadas'}</div>
        </div>
        <table class="summary-table">
          <thead>
            <tr>
              <th style="width:35%">Empleada</th>
              <th>Días</th>
              <th>Total</th>
              <th>Productivas</th>
              <th>Breaks</th>
            </tr>
          </thead>
          <tbody>
    `;
    
    for (const emp of emps) {
      const stats = getEmployeeStats(emp.id);
      const initials = emp.full_name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
      
      html += `
        <tr class="clickable" onclick="showDetail('${emp.id}')">
          <td>
            <div style="display:flex;align-items:center;gap:10px;">
              <div style="width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#a78bfa,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;">${initials}</div>
              <div>
                <div class="cell-name">${emp.full_name}</div>
                <div style="font-size:11px;color:rgba(255,255,255,0.4);">@${emp.username}</div>
              </div>
            </div>
          </td>
          <td class="cell-num">${stats.daysWorked}</td>
          <td class="cell-num">${formatHours(stats.totalHours)}</td>
          <td class="cell-num green">${formatHours(stats.productiveHours)}</td>
          <td class="cell-num muted">${stats.breakCount} · ${formatHours(stats.breakHours)}</td>
        </tr>
      `;
    }
    
    html += '</tbody></table></div>';
  }

  container.innerHTML = html;
}

function formatHours(hours) {
  if (hours < 0.01) return '—';
  const h = Math.floor(hours);
  const m = Math.round((hours - h) * 60);
  if (h === 0) return `${m}min`;
  if (m === 0) return `${h}h`;
  return `${h}h ${m}min`;
}

function formatTime(iso) {
  return new Date(iso).toLocaleTimeString('es-AR', { 
    hour: '2-digit', minute: '2-digit', hour12: false 
  });
}

function formatDate(date) {
  return date.toLocaleDateString('es-AR', { 
    weekday: 'short', day: 'numeric', month: 'short' 
  });
}

// ============ DETAIL ============
function showDetail(empId) {
  const emp = employees.find(e => e.id === empId);
  if (!emp) return;

  const stats = getEmployeeStats(empId);
  const days = getDayDetails(empId);

  document.getElementById('detailName').textContent = emp.full_name;
  document.getElementById('detailSubtitle').textContent = 
    `${ROLES[emp.default_role] || emp.default_role} · ${viewMonth.toLocaleDateString('es-AR', { month: 'long', year: 'numeric' })}`;

  document.getElementById('detailStats').innerHTML = `
    <div class="stat-box">
      <div class="stat-value">${stats.daysWorked}</div>
      <div class="stat-label">Días</div>
    </div>
    <div class="stat-box">
      <div class="stat-value">${formatHours(stats.totalHours)}</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" style="color:#4ade80;">${formatHours(stats.productiveHours)}</div>
      <div class="stat-label">Productivas</div>
    </div>
    <div class="stat-box">
      <div class="stat-value">${stats.breakCount}</div>
      <div class="stat-label">Breaks (${formatHours(stats.breakHours)})</div>
    </div>
  `;

  const daysContainer = document.getElementById('detailDays');
  if (days.length === 0) {
    daysContainer.innerHTML = '<div class="empty-state">Sin fichajes este mes</div>';
  } else {
    daysContainer.innerHTML = days.map(d => {
      let breaksHtml = '';
      if (d.breaks.length > 0) {
        breaksHtml = '<div style="margin-top:6px;font-size:11px;color:rgba(255,255,255,0.5);">';
        breaksHtml += `Breaks: ${d.breaks.map(b => 
          `${formatTime(b.start)}-${b.end ? formatTime(b.end) : '?'} (${Math.round(b.duration)}m)`
        ).join(', ')}`;
        breaksHtml += '</div>';
      }
      return `
        <div class="day-row">
          <div class="day-row-header">
            <div class="day-date">${formatDate(d.date)}</div>
            <div class="day-prod">${formatHours(d.productiveMin / 60)}</div>
          </div>
          <div class="day-detail">
            <span class="punch-pair">↓ ${d.entrada ? formatTime(d.entrada) : '?'} → ↑ ${d.salida ? formatTime(d.salida) : '?'}</span>
            <span style="color:rgba(255,255,255,0.4);">${ROLES[d.role] || d.role || ''}</span>
          </div>
          ${breaksHtml}
        </div>
      `;
    }).join('');
  }

  document.getElementById('detailOverlay').classList.add('show');
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('show');
}

updateMonthDisplay();
document.getElementById('usernameInput').focus();
</script>
