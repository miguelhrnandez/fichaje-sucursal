<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Fichaje - Pantalla QR</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- ✅ Cambiado: davidshimjs/qrcodejs es el más confiable para HTML plano -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow: hidden;
}

.container {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 28px;
  padding: 40px;
  max-width: 500px;
  width: 100%;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
}

.header { margin-bottom: 24px; }

.clock {
  font-family: 'JetBrains Mono', monospace;
  font-size: 48px;
  font-weight: 700;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, #fff, #a0a0ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
}

.date {
  font-size: 14px;
  color: rgba(255, 255, 255, 0.6);
  text-transform: capitalize;
  margin-bottom: 20px;
}

.branch-name {
  font-size: 18px;
  font-weight: 600;
  color: #a0a0ff;
  letter-spacing: 0.02em;
}

.qr-container {
  background: white;
  padding: 24px;
  border-radius: 20px;
  margin: 24px 0;
  display: inline-block;
}

/* ✅ qrcodejs genera un div con una imagen adentro, no un canvas */
#qrcode { display: block; }
#qrcode img { display: block; }

.pin-section {
  margin-top: 20px;
  padding: 16px 20px;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 16px;
  border: 1px solid rgba(255, 255, 255, 0.1);
}

.pin-label {
  font-size: 11px;
  color: rgba(255, 255, 255, 0.5);
  text-transform: uppercase;
  letter-spacing: 0.15em;
  margin-bottom: 8px;
}

.pin-code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 42px;
  font-weight: 700;
  letter-spacing: 0.2em;
  background: linear-gradient(135deg, #fff, #ffb380);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.progress-section {
  margin-top: 24px;
}

.progress-bar {
  height: 6px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #4ade80, #22d3ee);
  border-radius: 3px;
  transition: width 1s linear;
}

.progress-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: rgba(255, 255, 255, 0.5);
  margin-top: 8px;
}

.status {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(0, 0, 0, 0.3);
  padding: 8px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #4ade80;
  animation: pulse 2s infinite;
}

.status-dot.error { background: #ff6b6b; animation: none; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.error {
  color: #ff6b6b;
  font-size: 14px;
  margin-top: 16px;
}

.ip-info {
  font-size: 10px;
  color: rgba(255, 255, 255, 0.3);
  font-family: 'JetBrains Mono', monospace;
  margin-top: 12px;
}

@media (max-width: 600px) {
  .clock { font-size: 36px; }
  .pin-code { font-size: 32px; }
  .container { padding: 24px; }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="clock" id="clock">--:--:--</div>
    <div class="date" id="date">Cargando...</div>
    <div class="branch-name" id="branchName">Sucursal</div>
  </div>

  <div class="qr-container">
    <!-- ✅ qrcodejs necesita un div, no un canvas -->
    <div id="qrcode"></div>
  </div>

  <div class="pin-section">
    <div class="pin-label">PIN de respaldo</div>
    <div class="pin-code" id="pinCode">------</div>
  </div>

  <div class="progress-section">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 100%"></div>
    </div>
    <div class="progress-text" id="progressText">Nuevo código en 30s</div>
  </div>

  <div class="error" id="errorMsg"></div>
  <div class="ip-info" id="ipInfo"></div>
</div>

<div class="status">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusText">Conectando...</span>
</div>

<script>
const SUPABASE_URL = 'https://raykzuncciaaouleezmx.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJheWt6dW5jY2lhYW91bGVlem14Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NjQ2MzIsImV4cCI6MjA5NDI0MDYzMn0.w50r_YXzMPZjM8BqJYkP1yA5i_sl4yz3i7io_Fx6dX8';
const BRANCH_ID = '11111111-1111-1111-1111-111111111111';

const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentToken = null;
let secondsLeft = 30;
let qrInstance = null; // ✅ guardamos la instancia para poder reusar/limpiar

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('es-AR', { hour12: false });
  document.getElementById('date').textContent =
    now.toLocaleDateString('es-AR', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    });
}
setInterval(updateClock, 1000);
updateClock();

function generateRandomCode(length) {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let result = '';
  for (let i = 0; i < length; i++) {
    result += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return result;
}

function generatePin() {
  let pin = '';
  for (let i = 0; i < 6; i++) pin += Math.floor(Math.random() * 10);
  return pin;
}

function renderQR(text) {
  const container = document.getElementById('qrcode');

  if (qrInstance) {
    // ✅ Si ya existe una instancia, actualizamos el contenido
    qrInstance.clear();
    qrInstance.makeCode(text);
  } else {
    // ✅ Primera vez: creamos la instancia
    qrInstance = new QRCode(container, {
      text: text,
      width: 260,
      height: 260,
      colorDark: '#1a1a2e',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  }
}

function setStatus(connected) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  if (connected) {
    dot.className = 'status-dot';
    text.textContent = 'Conectado';
  } else {
    dot.className = 'status-dot error';
    text.textContent = 'Sin conexión';
  }
}

async function generateNewToken() {
  try {
    const qrCode = generateRandomCode(16);
    const pinCode = generatePin();
    const expiresAt = new Date(Date.now() + 35000).toISOString();

    await db
      .from('active_tokens')
      .delete()
      .eq('branch_id', BRANCH_ID);

    const { data, error } = await db
      .from('active_tokens')
      .insert({
        branch_id: BRANCH_ID,
        qr_code: qrCode,
        pin_code: pinCode,
        expires_at: expiresAt
      })
      .select()
      .single();

    if (error) throw error;

    currentToken = data;

    // ✅ Usamos nuestra función que maneja tanto primer render como updates
    renderQR(qrCode);

    document.getElementById('pinCode').textContent = pinCode;
    secondsLeft = 30;
    document.getElementById('progressFill').style.width = '100%';
    document.getElementById('errorMsg').textContent = '';
    setStatus(true);

  } catch (err) {
    console.error('Error generando token:', err);
    document.getElementById('errorMsg').textContent =
      'Error de conexión: ' + err.message;
    setStatus(false);
  }
}

function updateProgress() {
  secondsLeft--;
  if (secondsLeft < 0) secondsLeft = 0;
  const percentage = (secondsLeft / 30) * 100;
  document.getElementById('progressFill').style.width = percentage + '%';
  document.getElementById('progressText').textContent =
    `Nuevo código en ${secondsLeft}s`;

  if (secondsLeft <= 0) {
    generateNewToken();
  }
}

async function updatePublicIP() {
  try {
    const response = await fetch('https://api.ipify.org?format=json');
    const data = await response.json();
    const ip = data.ip;

    document.getElementById('ipInfo').textContent = `IP local: ${ip}`;

    await db
      .from('branches')
      .update({
        public_ip: ip,
        ip_last_updated: new Date().toISOString()
      })
      .eq('id', BRANCH_ID);

  } catch (err) {
    console.error('No se pudo detectar la IP:', err);
  }
}

async function loadBranchInfo() {
  try {
    const { data } = await db
      .from('branches')
      .select('name')
      .eq('id', BRANCH_ID)
      .single();

    if (data) {
      document.getElementById('branchName').textContent = data.name;
    }
  } catch (err) {
    console.error('Error cargando sucursal:', err);
  }
}

async function init() {
  await loadBranchInfo();
  await updatePublicIP();
  await generateNewToken();
  setInterval(updateProgress, 1000);
  setInterval(updatePublicIP, 3600000);
}

init();
</script>

</body>
</html>
