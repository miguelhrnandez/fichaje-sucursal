<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Fichaje - Pantalla QR</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow: hidden;
}

.container {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 28px;
  padding: 40px;
  max-width: 500px;
  width: 100%;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
}

.header { margin-bottom: 24px; }

.clock {
  font-family: 'JetBrains Mono', monospace;
  font-size: 48px;
  font-weight: 700;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, #fff, #a0a0ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
}

.date {
  font-size: 14px;
  color: rgba(255, 255, 255, 0.6);
  text-transform: capitalize;
  margin-bottom: 20px;
}

.branch-name {
  font-size: 18px;
  font-weight: 600;
  color: #a0a0ff;
  letter-spacing: 0.02em;
}

.qr-container {
  background: white;
  padding: 24px;
  border-radius: 20px;
  margin: 24px 0;
  display: inline-block;
}

#qrcode { display: block; }
#qrcode img { display: block; }

.pin-section {
  margin-top: 20px;
  padding: 16px 20px;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 16px;
  border: 1px solid rgba(255, 255, 255, 0.1);
}

.pin-label {
  font-size: 11px;
  color: rgba(255, 255, 255, 0.5);
  text-transform: uppercase;
  letter-spacing: 0.15em;
  margin-bottom: 8px;
}

.pin-code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 42px;
  font-weight: 700;
  letter-spacing: 0.2em;
  background: linear-gradient(135deg, #fff, #ffb380);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.progress-section {
  margin-top: 24px;
}

.progress-bar {
  height: 6px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #4ade80, #22d3ee);
  border-radius: 3px;
  transition: width 1s linear;
}

.progress-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: rgba(255, 255, 255, 0.5);
  margin-top: 8px;
}

.status {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(0, 0, 0, 0.3);
  padding: 8px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #4ade80;
  animation: pulse 2s infinite;
}

.status-dot.error { background: #ff6b6b; animation: none; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.error {
  color: #ff6b6b;
  font-size: 14px;
  margin-top: 16px;
}

.ip-info {
  font-size: 10px;
  color: rgba(255, 255, 255, 0.3);
  font-family: 'JetBrains Mono', monospace;
  margin-top: 12px;
}

.warning-banner {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255, 170, 59, 0.15);
  border: 1px solid rgba(255, 170, 59, 0.4);
  color: #ffaa3b;
  padding: 8px 16px;
  border-radius: 12px;
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  display: none;
}

.warning-banner.show { display: block; }

@media (max-width: 600px) {
  .clock { font-size: 36px; }
  .pin-code { font-size: 32px; }
  .container { padding: 24px; }
}
</style>
</head>
<body>

<div class="warning-banner" id="warningBanner">
  ⚠ Esta pestaña debe permanecer visible
</div>

<div class="container">
  <div class="header">
    <div class="clock" id="clock">--:--:--</div>
    <div class="date" id="date">Cargando...</div>
    <div class="branch-name" id="branchName">Sucursal</div>
  </div>

  <div class="qr-container">
    <div id="qrcode"></div>
  </div>

  <div class="pin-section">
    <div class="pin-label">PIN de respaldo</div>
    <div class="pin-code" id="pinCode">------</div>
  </div>

  <div class="progress-section">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 100%"></div>
    </div>
    <div class="progress-text" id="progressText">Nuevo código en 30s</div>
  </div>

  <div class="error" id="errorMsg"></div>
  <div class="ip-info" id="ipInfo"></div>
</div>

<div class="status">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusText">Conectando...</span>
</div>

<script>
const SUPABASE_URL = 'https://raykzuncciaaouleezmx.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJheWt6dW5jY2lhYW91bGVlem14Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NjQ2MzIsImV4cCI6MjA5NDI0MDYzMn0.w50r_YXzMPZjM8BqJYkP1yA5i_sl4yz3i7io_Fx6dX8';
const BRANCH_ID = '11111111-1111-1111-1111-111111111111';
const TOKEN_DURATION_MS = 60000; // 60 segundos (más tolerante)

const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentToken = null;
let lastTokenTime = 0;
let qrInstance = null;
let wakeLock = null;

// ============ WAKE LOCK ============
// Pide al navegador que no duerma la pantalla
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      console.log('Wake Lock activado');
    }
  } catch (err) {
    console.log('Wake Lock no disponible:', err);
  }
}

// ============ DETECCIÓN DE PESTAÑA INACTIVA ============
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    // La pestaña volvió al frente
    document.getElementById('warningBanner').classList.remove('show');
    console.log('Pestaña visible - verificando token');
    checkAndRefreshToken();
    requestWakeLock();
  } else {
    // La pestaña pasó a segundo plano
    document.getElementById('warningBanner').classList.add('show');
    console.log('Pestaña oculta');
  }
});

// ============ RELOJ ============
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('es-AR', { hour12: false });
  document.getElementById('date').textContent =
    now.toLocaleDateString('es-AR', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    });
}

function generateRandomCode(length) {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let result = '';
  for (let i = 0; i < length; i++) {
    result += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return result;
}

function generatePin() {
  let pin = '';
  for (let i = 0; i < 6; i++) pin += Math.floor(Math.random() * 10);
  return pin;
}

function renderQR(text) {
  const container = document.getElementById('qrcode');
  if (qrInstance) {
    qrInstance.clear();
    qrInstance.makeCode(text);
  } else {
    qrInstance = new QRCode(container, {
      text: text,
      width: 260,
      height: 260,
      colorDark: '#1a1a2e',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  }
}

function setStatus(connected) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  if (connected) {
    dot.className = 'status-dot';
    text.textContent = 'Conectado';
  } else {
    dot.className = 'status-dot error';
    text.textContent = 'Sin conexión';
  }
}

// ============ GENERAR NUEVO TOKEN ============
async function generateNewToken() {
  try {
    const qrCode = generateRandomCode(16);
    const pinCode = generatePin();
    const expiresAt = new Date(Date.now() + TOKEN_DURATION_MS).toISOString();

    // Borrar viejos
    await db
      .from('active_tokens')
      .delete()
      .eq('branch_id', BRANCH_ID);

    // Insertar nuevo
    const { data, error } = await db
      .from('active_tokens')
      .insert({
        branch_id: BRANCH_ID,
        qr_code: qrCode,
        pin_code: pinCode,
        expires_at: expiresAt
      })
      .select()
      .single();

    if (error) throw error;

    currentToken = data;
    lastTokenTime = Date.now();

    renderQR(qrCode);
    document.getElementById('pinCode').textContent = pinCode;
    document.getElementById('errorMsg').textContent = '';
    setStatus(true);

    console.log('Token generado:', pinCode, 'expira en', TOKEN_DURATION_MS / 1000, 's');

  } catch (err) {
    console.error('Error generando token:', err);
    document.getElementById('errorMsg').textContent =
      'Error: ' + err.message;
    setStatus(false);
  }
}

// ============ TIMER PRINCIPAL (basado en tiempo real) ============
function tickTimer() {
  updateClock();

  if (!lastTokenTime) return;

  const elapsed = Date.now() - lastTokenTime;
  const remaining = Math.max(0, TOKEN_DURATION_MS - elapsed);
  const percentage = (remaining / TOKEN_DURATION_MS) * 100;
  const seconds = Math.ceil(remaining / 1000);

  document.getElementById('progressFill').style.width = percentage + '%';
  document.getElementById('progressText').textContent =
    `Nuevo código en ${seconds}s`;

  // Si el token expiró o está por expirar, generar uno nuevo
  if (remaining <= 0) {
    generateNewToken();
  }
}

// ============ VERIFICAR Y REFRESCAR SI HACE FALTA ============
async function checkAndRefreshToken() {
  // Si el token tiene más de 50 segundos, generar uno nuevo
  if (!lastTokenTime || (Date.now() - lastTokenTime) > 50000) {
    await generateNewToken();
  }
}

// ============ IP PÚBLICA ============
async function updatePublicIP() {
  try {
    const response = await fetch('https://api.ipify.org?format=json');
    const data = await response.json();
    const ip = data.ip;

    document.getElementById('ipInfo').textContent = `IP local: ${ip}`;

    await db
      .from('branches')
      .update({
        public_ip: ip,
        ip_last_updated: new Date().toISOString()
      })
      .eq('id', BRANCH_ID);

  } catch (err) {
    console.error('No se pudo detectar la IP:', err);
  }
}

async function loadBranchInfo() {
  try {
    const { data } = await db
      .from('branches')
      .select('name')
      .eq('id', BRANCH_ID)
      .single();

    if (data) {
      document.getElementById('branchName').textContent = data.name;
    }
  } catch (err) {
    console.error('Error cargando sucursal:', err);
  }
}

// ============ INIT ============
async function init() {
  updateClock();
  await loadBranchInfo();
  await updatePublicIP();
  await generateNewToken();
  await requestWakeLock();

  // Timer que corre cada segundo
  setInterval(tickTimer, 1000);

  // Verificación de respaldo cada 5 segundos (por si setInterval falla)
  setInterval(checkAndRefreshToken, 5000);

  // Actualizar IP cada hora
  setInterval(updatePublicIP, 3600000);
}

init();
</script>

</body>
</html>
