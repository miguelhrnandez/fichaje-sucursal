<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Fichaje - Pantalla QR</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow: hidden;
}

.role-banner {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  padding: 6px 16px;
  border-radius: 999px;
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  z-index: 10;
}

.role-banner.principal {
  background: rgba(74, 222, 128, 0.15);
  color: #4ade80;
  border: 1px solid rgba(74, 222, 128, 0.4);
}

.role-banner.mirror {
  background: rgba(167, 139, 250, 0.15);
  color: #a78bfa;
  border: 1px solid rgba(167, 139, 250, 0.4);
}

.container {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 28px;
  padding: 40px;
  max-width: 500px;
  width: 100%;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
}

.header { margin-bottom: 24px; }

.clock {
  font-family: 'JetBrains Mono', monospace;
  font-size: 48px;
  font-weight: 700;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, #fff, #a0a0ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
}

.date {
  font-size: 14px;
  color: rgba(255, 255, 255, 0.6);
  text-transform: capitalize;
  margin-bottom: 20px;
}

.branch-name {
  font-size: 18px;
  font-weight: 600;
  color: #a0a0ff;
  letter-spacing: 0.02em;
}

.qr-container {
  background: white;
  padding: 24px;
  border-radius: 20px;
  margin: 24px 0;
  display: inline-block;
}

#qrcode { display: block; }
#qrcode img { display: block; }

.pin-section {
  margin-top: 20px;
  padding: 16px 20px;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 16px;
  border: 1px solid rgba(255, 255, 255, 0.1);
}

.pin-label {
  font-size: 11px;
  color: rgba(255, 255, 255, 0.5);
  text-transform: uppercase;
  letter-spacing: 0.15em;
  margin-bottom: 8px;
}

.pin-code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 42px;
  font-weight: 700;
  letter-spacing: 0.2em;
  background: linear-gradient(135deg, #fff, #ffb380);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.progress-section {
  margin-top: 24px;
}

.progress-bar {
  height: 6px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #4ade80, #22d3ee);
  border-radius: 3px;
  transition: width 1s linear;
}

.progress-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: rgba(255, 255, 255, 0.5);
  margin-top: 8px;
}

.status {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(0, 0, 0, 0.3);
  padding: 8px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #4ade80;
  animation: pulse 2s infinite;
}

.status-dot.error { background: #ff6b6b; animation: none; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.error {
  color: #ff6b6b;
  font-size: 14px;
  margin-top: 16px;
}

.ip-info {
  font-size: 10px;
  color: rgba(255, 255, 255, 0.3);
  font-family: 'JetBrains Mono', monospace;
  margin-top: 12px;
}

@media (max-width: 600px) {
  .clock { font-size: 36px; }
  .pin-code { font-size: 32px; }
  .container { padding: 24px; }
}
</style>
</head>
<body>

<div class="role-banner principal" id="roleBanner">
  ◉ INICIANDO
</div>

<div class="container">
  <div class="header">
    <div class="clock" id="clock">--:--:--</div>
    <div class="date" id="date">Cargando...</div>
    <div class="branch-name" id="branchName">Sucursal</div>
  </div>

  <div class="qr-container">
    <div id="qrcode"></div>
  </div>

  <div class="pin-section">
    <div class="pin-label">PIN de respaldo</div>
    <div class="pin-code" id="pinCode">------</div>
  </div>

  <div class="progress-section">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 100%"></div>
    </div>
    <div class="progress-text" id="progressText">Esperando código...</div>
  </div>

  <div class="error" id="errorMsg"></div>
  <div class="ip-info" id="ipInfo"></div>
</div>

<div class="status">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusText">Conectando...</span>
</div>

<script>
const SUPABASE_URL = 'https://raykzuncciaaouleezmx.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJheWt6dW5jY2lhYW91bGVlem14Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NjQ2MzIsImV4cCI6MjA5NDI0MDYzMn0.w50r_YXzMPZjM8BqJYkP1yA5i_sl4yz3i7io_Fx6dX8';
const BRANCH_ID = '11111111-1111-1111-1111-111111111111';
const TOKEN_DURATION_MS = 60000; // 60 segundos
const HEARTBEAT_INTERVAL_MS = 5000; // 5 segundos
const LEADER_TIMEOUT_MS = 20000; // 20 segundos sin heartbeat = líder muerto

// ID único de esta pestaña (cambia cada vez que se abre)
const TAB_ID = 'tab_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10);

const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let isLeader = false;
let currentToken = null;
let lastTokenTime = 0;
let qrInstance = null;
let realtimeChannel = null;

// ============ UI HELPERS ============
function setRoleBanner(role) {
  const banner = document.getElementById('roleBanner');
  if (role === 'principal') {
    banner.className = 'role-banner principal';
    banner.textContent = '◉ PANTALLA PRINCIPAL';
  } else if (role === 'mirror') {
    banner.className = 'role-banner mirror';
    banner.textContent = '🔁 PANTALLA ESPEJO';
  } else {
    banner.className = 'role-banner principal';
    banner.textContent = '◉ ' + role;
  }
}

function setStatus(connected, role) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  if (connected) {
    dot.className = 'status-dot';
    text.textContent = 'Conectado (' + (role === 'principal' ? 'Principal' : 'Espejo') + ')';
  } else {
    dot.className = 'status-dot error';
    text.textContent = 'Sin conexión';
  }
}

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('es-AR', { hour12: false });
  document.getElementById('date').textContent =
    now.toLocaleDateString('es-AR', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    });
}

function renderQR(text) {
  const container = document.getElementById('qrcode');
  if (qrInstance) {
    qrInstance.clear();
    qrInstance.makeCode(text);
  } else {
    qrInstance = new QRCode(container, {
      text: text,
      width: 260,
      height: 260,
      colorDark: '#1a1a2e',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  }
}

function displayToken(qrCode, pinCode, createdAt) {
  renderQR(qrCode);
  document.getElementById('pinCode').textContent = pinCode;
  if (createdAt) {
    lastTokenTime = new Date(createdAt).getTime();
  }
}

function generateRandomCode(length) {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let result = '';
  for (let i = 0; i < length; i++) {
    result += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return result;
}

function generatePin() {
  let pin = '';
  for (let i = 0; i < 6; i++) pin += Math.floor(Math.random() * 10);
  return pin;
}

// ============ LIDER: GENERAR TOKEN ============
async function generateNewToken() {
  if (!isLeader) return;

  try {
    const qrCode = generateRandomCode(16);
    const pinCode = generatePin();
    const expiresAt = new Date(Date.now() + TOKEN_DURATION_MS).toISOString();

    // Borrar viejos
    await db
      .from('active_tokens')
      .delete()
      .eq('branch_id', BRANCH_ID);

    // Insertar nuevo
    const { data, error } = await db
      .from('active_tokens')
      .insert({
        branch_id: BRANCH_ID,
        qr_code: qrCode,
        pin_code: pinCode,
        expires_at: expiresAt
      })
      .select()
      .single();

    if (error) throw error;

    currentToken = data;
    lastTokenTime = Date.now();
    displayToken(qrCode, pinCode);
    setStatus(true, 'principal');
    document.getElementById('errorMsg').textContent = '';

    console.log('[LIDER] Token generado:', pinCode);

  } catch (err) {
    console.error('Error generando token:', err);
    document.getElementById('errorMsg').textContent = 'Error: ' + err.message;
    setStatus(false, 'principal');
  }
}

// ============ SEGUIDOR: CARGAR TOKEN ACTUAL ============
async function loadCurrentToken() {
  try {
    const { data: tokens, error } = await db
      .from('active_tokens')
      .select('*')
      .eq('branch_id', BRANCH_ID)
      .order('created_at', { ascending: false })
      .limit(1);

    if (error) throw error;

    if (tokens && tokens.length > 0) {
      const t = tokens[0];
      displayToken(t.qr_code, t.pin_code, t.created_at);
      setStatus(true, isLeader ? 'principal' : 'mirror');
    }
  } catch (err) {
    console.error('Error cargando token:', err);
  }
}

// ============ HEARTBEAT (Líder) ============
async function sendHeartbeat() {
  if (!isLeader) return;

  try {
    await db
      .from('display_leaders')
      .upsert({
        branch_id: BRANCH_ID,
        leader_id: TAB_ID,
        last_heartbeat: new Date().toISOString()
      });
  } catch (err) {
    console.error('Error en heartbeat:', err);
  }
}

// ============ ELECCIÓN DE LÍDER ============
async function checkAndElectLeader() {
  try {
    const { data, error } = await db
      .from('display_leaders')
      .select('*')
      .eq('branch_id', BRANCH_ID)
      .single();

    const now = Date.now();

    // Si NO hay líder o el líder está muerto, intento ser líder
    const noLeader = !data;
    const leaderDead = data && 
      (now - new Date(data.last_heartbeat).getTime()) > LEADER_TIMEOUT_MS;
    const iAmLeader = data && data.leader_id === TAB_ID;

    if (noLeader || leaderDead || iAmLeader) {
      // Intentar ser líder
      const { error: claimError } = await db
        .from('display_leaders')
        .upsert({
          branch_id: BRANCH_ID,
          leader_id: TAB_ID,
          last_heartbeat: new Date().toISOString()
        });

      if (!claimError) {
        if (!isLeader) {
          console.log('[ELECCIÓN] Soy el nuevo líder');
          isLeader = true;
          setRoleBanner('principal');
          setStatus(true, 'principal');
          await generateNewToken();
        }
      }
    } else {
      // Hay un líder vivo y no soy yo
      if (isLeader) {
        console.log('[ELECCIÓN] Perdí el liderazgo');
      }
      isLeader = false;
      setRoleBanner('mirror');
      setStatus(true, 'mirror');
      await loadCurrentToken();
    }
  } catch (err) {
    console.error('Error en elección:', err);
  }
}

// ============ TIMER PRINCIPAL ============
function tickTimer() {
  updateClock();

  if (!lastTokenTime) return;

  const elapsed = Date.now() - lastTokenTime;
  const remaining = Math.max(0, TOKEN_DURATION_MS - elapsed);
  const percentage = (remaining / TOKEN_DURATION_MS) * 100;
  const seconds = Math.ceil(remaining / 1000);

  document.getElementById('progressFill').style.width = percentage + '%';
  document.getElementById('progressText').textContent =
    `Nuevo código en ${seconds}s`;

  // Si soy líder y el token expiró, generar uno nuevo
  if (isLeader && remaining <= 0) {
    generateNewToken();
  }
}

// ============ REALTIME: ESCUCHAR CAMBIOS ============
function setupRealtime() {
  realtimeChannel = db
    .channel('qr-changes')
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'active_tokens',
      filter: `branch_id=eq.${BRANCH_ID}`
    }, (payload) => {
      // Si soy mirror, actualizar pantalla
      if (!isLeader && payload.new) {
        displayToken(payload.new.qr_code, payload.new.pin_code, payload.new.created_at);
        console.log('[MIRROR] Token actualizado:', payload.new.pin_code);
      }
    })
    .subscribe();
}

// ============ IP PÚBLICA ============
async function updatePublicIP() {
  try {
    const response = await fetch('https://api.ipify.org?format=json');
    const data = await response.json();
    const ip = data.ip;

    document.getElementById('ipInfo').textContent = `IP local: ${ip}`;

    if (isLeader) {
      await db
        .from('branches')
        .update({
          public_ip: ip,
          ip_last_updated: new Date().toISOString()
        })
        .eq('id', BRANCH_ID);
    }
  } catch (err) {
    console.error('No se pudo detectar la IP:', err);
  }
}

async function loadBranchInfo() {
  try {
    const { data } = await db
      .from('branches')
      .select('name')
      .eq('id', BRANCH_ID)
      .single();

    if (data) {
      document.getElementById('branchName').textContent = data.name;
    }
  } catch (err) {
    console.error('Error cargando sucursal:', err);
  }
}

// ============ LIBERAR LIDERAZGO AL CERRAR ============
window.addEventListener('beforeunload', async () => {
  if (isLeader) {
    try {
      // Marcar heartbeat muy viejo para que otro tome el liderazgo rápido
      await db
        .from('display_leaders')
        .update({
          last_heartbeat: new Date(Date.now() - LEADER_TIMEOUT_MS - 1000).toISOString()
        })
        .eq('branch_id', BRANCH_ID)
        .eq('leader_id', TAB_ID);
    } catch (err) {
      // ignorar
    }
  }
});

// ============ INIT ============
async function init() {
  updateClock();
  await loadBranchInfo();
  await updatePublicIP();

  // Setup realtime para recibir tokens nuevos
  setupRealtime();

  // Primera elección de líder
  await checkAndElectLeader();

  // Si no soy líder, cargar el token actual
  if (!isLeader) {
    await loadCurrentToken();
  }

  // Timer del reloj y barra
  setInterval(tickTimer, 1000);

  // Heartbeat (solo si soy líder)
  setInterval(sendHeartbeat, HEARTBEAT_INTERVAL_MS);

  // Re-elección cada 10 segundos (por si el líder murió)
  setInterval(checkAndElectLeader, 10000);

  // Actualizar IP cada hora
  setInterval(updatePublicIP, 3600000);
}

init();
</script>

</body>
</html>
